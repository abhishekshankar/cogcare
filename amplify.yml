# Amplify Hosting — Gen 2 fullstack: deploy backend, generate `src/amplify_outputs.json`, build Vite.
# Requires an Amplify app connected with Gen 2 backend (same repo). See docs/cogcare-amplify.md.
#
# Node 20+ (Vite 7 / React 19). Use `npm install` (not `npm ci`) per repo `.npmrc` / lockfile notes.
version: 1
backend:
  phases:
    build:
      commands:
        - nvm install 20
        - nvm use 20
        - node -v
        - npm install --no-audit --no-fund --cache .npm --prefer-offline
        - export CI=1
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - node -v
        - npm install --no-audit --no-fund --cache .npm --prefer-offline
        - npx ampx generate outputs --branch $AWS_BRANCH --app-id $AWS_APP_ID --out-dir src
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
