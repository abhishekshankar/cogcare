# Amplify Hosting — Gen 2 fullstack: deploy backend, generate `src/amplify_outputs.json`, build Vite.
# Requires an Amplify app connected with Gen 2 backend (same repo). See docs/cogcare-amplify.md.
#
# Node 20+ (Vite 7 / React 19). Use `npm install` (not `npm ci`) per repo `.npmrc` / lockfile notes.
#
# Amplify often sets NODE_ENV=production during install, which skips devDependencies — but
# @aws-amplify/backend-cli (the `ampx` CLI) lives in devDependencies. Use --include=dev so
# `npx ampx pipeline-deploy` and `npx ampx generate outputs` resolve. Do not run
# `npx @aws-amplify/backend-cli` alone (that prints help with no subcommand).
version: 1
backend:
  phases:
    build:
      commands:
        - nvm install 20
        - nvm use 20
        - node -v
        - npm install --no-audit --no-fund --include=dev --cache .npm --prefer-offline
        - export CI=1
        - |
          if [ -z "${AWS_BRANCH:-}" ] || [ -z "${AWS_APP_ID:-}" ]; then
            echo "ERROR: AWS_BRANCH or AWS_APP_ID is empty. Amplify Hosting must inject these for Gen 2 fullstack apps."
            echo "AWS_BRANCH=${AWS_BRANCH:-} AWS_APP_ID=${AWS_APP_ID:-}"
            exit 1
          fi
        - export NODE_OPTIONS=--max-old-space-size=8192
        # APP_BASE_URL is baked into the completeAssessment Lambda env at synth time
        # (see amplify/backend.ts). Magic-link emails use it to build /auth/magic URLs.
        # Prefer an explicit Hosting env var (e.g. custom domain like https://app.cogcare.org);
        # fall back to the default Amplify branch URL `https://<branch>.<app-id>.amplifyapp.com`.
        - |
          if [ -z "${APP_BASE_URL:-}" ]; then
            export APP_BASE_URL="https://${AWS_BRANCH}.${AWS_APP_ID}.amplifyapp.com"
            echo "APP_BASE_URL not set; defaulting to ${APP_BASE_URL}"
          else
            echo "APP_BASE_URL provided: ${APP_BASE_URL}"
          fi
        - npx ampx pipeline-deploy --branch "$AWS_BRANCH" --app-id "$AWS_APP_ID"
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - node -v
        - npm install --no-audit --no-fund --include=dev --cache .npm --prefer-offline
        - |
          if [ -z "${AWS_BRANCH:-}" ] || [ -z "${AWS_APP_ID:-}" ]; then
            echo "ERROR: AWS_BRANCH or AWS_APP_ID is empty."
            exit 1
          fi
        - npx ampx generate outputs --branch "$AWS_BRANCH" --app-id "$AWS_APP_ID" --out-dir src
        - npm run write:email-config
        - npm run verify:outputs
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
